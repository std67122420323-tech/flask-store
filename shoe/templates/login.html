{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">เข้าสู่ระบบ</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">ชื่อผู้ใช้</label>
                        <input type="text" name="username" class="form-control" placeholder="กรอกชื่อผู้ใช้" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">รหัสผ่าน</label>
                        <input type="password" name="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
                <hr>
                <p class="text-center mb-0">ยังไม่เป็นสมาชิก? <a href="{{ url_for('register') }}" class="text-decoration-none">สมัครสมาชิกฟรี</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
