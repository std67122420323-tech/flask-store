{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 rounded-4 p-4 mx-auto" style="max-width: 600px;">
        <h2 class="fw-bold mb-4 text-center">{{ title }}</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Model Name</label>
                <input type="text" name="model" class="form-control rounded-pill" value="{{ shoe.model if shoe else '' }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Brand</label>
                <input type="text" name="brand" class="form-control rounded-pill" value="{{ shoe.brand if shoe else '' }}" required>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Price (฿)</label>
                    <input type="number" name="price" class="form-control rounded-pill" value="{{ shoe.price if shoe else '' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Shoe Size (US)</label>
                    <input type="number" step="0.1" name="size" class="form-control rounded-pill" value="{{ shoe.size if shoe else '' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Shirt Size</label>
                    <select name="shirt_size" class="form-select rounded-pill">
                        <option value="">None</option>
                        {% for s in ['S', 'M', 'L', 'XL', '2XL'] %}
                        <option value="{{ s }}" {% if shoe and shoe.shirt_size == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Main Image URL (รูปที่ 1)</label>
                <input type="text" name="img" class="form-control rounded-pill" value="{{ shoe.img if shoe else '' }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Additional Images (รูปที่ 2-5)</label>
                <textarea name="extra_imgs" class="form-control rounded-4" rows="5" placeholder="วางลิงก์รูปที่ 2&#10;วางลิงก์รูปที่ 3&#10;วางลิงก์รูปที่ 4&#10;วางลิงก์รูปที่ 5">{{ extra_imgs if extra_imgs else '' }}</textarea>
                <small class="text-muted">วาง 1 ลิงก์ต่อ 1 บรรทัด (กด Enter เพื่อขึ้นบรรทัดใหม่)</small>
            </div>

            <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 shadow-sm">Save Changes</button>
            <div class="text-center mt-3">
                <a href="{{ url_for('index') }}" class="text-muted text-decoration-none">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
