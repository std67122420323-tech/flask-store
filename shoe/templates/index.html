{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-collection"></i> คอลเลกชันของคุณ</h2>
    <a href="{{ url_for('add_shoe') }}" class="btn btn-dark">
        <i class="bi bi-plus-lg"></i> เพิ่มรองเท้าใหม่
    </a>
</div>

<form class="mb-4" method="GET" action="{{ url_for('index') }}">
    <div class="input-group shadow-sm">
        <input type="text" name="search" class="form-control" placeholder="ค้นหาชื่อรุ่นหรือแบรนด์..." value="{{ search_query }}">
        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> ค้นหา</button>
    </div>
</form>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for shoe in shoes %}
    <div class="col">
        <div class="card h-100 shadow-sm border-0">
            <img src="{{ shoe.img }}" class="card-img-top" alt="{{ shoe.model }}" style="height: 250px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title fw-bold text-uppercase">{{ shoe.brand }}</h5>
                <p class="card-text text-muted">{{ shoe.model }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge bg-success fs-6">฿{{ "{:,.2f}".format(shoe.price) }}</span>
                    <span class="text-muted small">Size: {{ shoe.size }}</span>
                </div>
            </div>
            <div class="card-footer bg-white border-0 pb-3">
                <div class="btn-group w-100">
                    <a href="{{ url_for('update_shoe', shoe_id=shoe.id) }}" class="btn btn-outline-secondary btn-sm">แก้ไข</a>
                    <form action="{{ url_for('delete_shoe', shoe_id=shoe.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100" onclick="return confirm('ยืนยันการลบ?')">ลบ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <i class="bi bi-emoji-smile text-muted" style="font-size: 3rem;"></i>
        <p class="mt-3 text-muted">ยังไม่มีรองเท้าในระบบ ลองเพิ่มคู่แรกของคุณดูสิ!</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
